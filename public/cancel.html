<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Checkout Cancelled | OP Raffles</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  </head>
  <body class="min-h-screen bg-stone-50 font-sans text-slate-900">

        <p class="mt-3 text-slate-600">You can return to active raffles anytime.</p>
        <div class="mt-6 flex flex-wrap gap-3">
          <a href="/index.html" class="rounded-xl bg-amber-500 px-5 py-3 text-sm font-semibold text-white hover:bg-amber-600">Browse Raffles</a>
          <a href="javascript:history.back()" class="rounded-xl border border-slate-300 px-5 py-3 text-sm font-semibold hover:bg-slate-50">Go Back</a>
        </div>
      </section>
    </main>
  </body>
</html>
