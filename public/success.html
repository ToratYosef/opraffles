<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Entry Confirmed | OP Raffles</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Sora", "ui-sans-serif", "system-ui"] },
            animation: {
              pulseFast: "pulse 0.35s ease-in-out infinite",
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-stone-50 text-slate-900">

    <main class="mx-auto max-w-3xl px-4 py-10">
      <div class="rounded-3xl border border-slate-200 bg-white p-8 shadow-lg">
        <p class="text-sm font-semibold uppercase tracking-wide text-emerald-700">Payment received</p>
        <h1 class="mt-2 text-3xl font-extrabold">Your raffle entry is confirmed</h1>
        <p class="mt-2 text-slate-600">We are finalizing your entry details.</p>

        <div id="successLoading" class="mt-6 rounded-xl border border-slate-200 bg-stone-50 p-4 text-sm text-slate-600">Loading your confirmation...</div>
        <div id="successError" class="mt-6 hidden rounded-xl border border-rose-200 bg-rose-50 p-4 text-sm text-rose-700"></div>

        <section id="successContent" class="mt-6 hidden space-y-4">
          <div class="grid gap-4 sm:grid-cols-2">
            <article class="rounded-xl border border-slate-200 bg-stone-50 p-4">
              <p class="text-xs uppercase tracking-wide text-slate-500">Raffle</p>
              <p id="summaryRaffle" class="mt-1 text-lg font-bold"></p>
            </article>
            <article class="rounded-xl border border-slate-200 bg-stone-50 p-4">
              <p class="text-xs uppercase tracking-wide text-slate-500">Entries</p>
              <p id="summaryEntries" class="mt-1 text-lg font-bold"></p>
            </article>
            <article class="rounded-xl border border-slate-200 bg-stone-50 p-4">
              <p class="text-xs uppercase tracking-wide text-slate-500">Amount</p>
              <p id="summaryAmount" class="mt-1 text-lg font-bold"></p>
            </article>
            <article id="assignedCardWrap" class="hidden rounded-xl border border-red-200 bg-red-50 p-4">
              <p class="text-xs uppercase tracking-wide text-red-600">Assigned Spin Number</p>
              <p id="summaryAssignedCard" class="mt-1 text-2xl font-extrabold text-red-700"></p>
            </article>
          </div>

          <a href="/index.html" class="inline-flex rounded-xl bg-amber-500 px-5 py-3 text-sm font-semibold text-white hover:bg-amber-600">Back to all raffles</a>
        </section>
      </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-functions-compat.js"></script>
    <script src="/__/firebase/init.js"></script>
    <script src="/assets/js/firebase.js"></script>
    <script src="/assets/js/success.js"></script>
  </body>
</html>
